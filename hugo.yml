baseURL: "https://myblog.xiangxun76.workers.dev/"
title: 向洵的博客
paginate: 5
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
copyright: © 2026 向洵. All Rights Reserved. # 版权声明
enableEmoji: true # 启动表情扩展

defaultContentLanguage: zh # 设置默认语言
languages:
  zh:
    languageCode: zh-CN           # 中文（中国）
    languageDirection: ltr        # 从左到右书写
    languageName: 中文             # 显示名称
    title: 向洵的博客
    params:
      label:
        text: "主页"
        icon: /apple-touch-icon.png
        iconHeight: 35
      homeInfoParams:
        Title: "你好  我是练习时长两年半 ! ! ! \U0001F44B"
        Content: 欢迎访问我的博客
    menu:
      main:
        - identifier: categories
          name: 分类
          url: /categories/
          weight: 10
        - identifier: tags
          name: 标签
          url: /tags/
          weight: 20
        - identifier: about
          name: 关于
          url: /about/
          weight: 30
    weight: 1                     # 排序权重
  en:
    languageCode: en-US           # 英文（美国）
    languageDirection: ltr        # 从左到右书写
    languageName: English         # 显示名称
    title: xiangxun's blog
    params:
      label:
        text: "Home"
        icon: /apple-touch-icon.png
        iconHeight: 35
      homeInfoParams:
        Title: "Hi there ! ! ! \U0001F44B"
        Content: welcome to my blog
    menu:
      main:
        - identifier: categories
          name: categories
          url: /categories/
          weight: 10
        - identifier: tags
          name: tags
          url: /tags/
          weight: 20
        - identifier: about
          name: about
          url: /about/
          weight: 30
    weight: 2                     # 排序权重

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  title: 向洵的博客
  description: "向洵的个人博客"
  keywords: [Blog, Portfolio, PaperMod]
  author: 向洵
  # author: ["Me", "You"] # multiple authors
  images: ["<link or path of image for opengraph, twitter-cards>"]
  DateFormat: "2006年1月2日 15:04:05"
  defaultTheme: auto # dark, light
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false
  displayFullLangName: true

  assets:
    disableHLJS: true # to disable highlight.js
    # disableFingerprinting: true
    favicon: "/favicon/favicon.ico"
    favicon16x16: "/favicon/favicon-16x16.png"
    favicon32x32: "/favicon/favicon-32x32.png"
    apple_touch_icon: "/favicon/apple-touch-icon.png"
    safari_pinned_tab: "<link / abs url>"

  

  # profile-mode
  profileMode:
    enabled: true # needs to be explicitly set
    title: 做大做强，再创辉煌
    subtitle: "QQ: 806181859"
    imageUrl: "/img/hhh.jpg"
    imageWidth: 120
    imageHeight: 120
    imageTitle: 服了
    buttons:
      - name: 文章
        url: posts
      - name: 标签
        url: tags

  # home-info mode
  homeInfoParams:
    Title: "Hi there ! ! ! \U0001F44B"
    Content: 欢迎访问我的博客

  socialIcons:
    - name: github
      url: "https://github.com/xmujin"
    - name: bilibili
      url: "https://space.bilibili.com/403427727"

  analytics:
    google:
      SiteVerificationTag: "XYZabc"
    bing:
      SiteVerificationTag: "XYZabc"
    yandex:
      SiteVerificationTag: "XYZabc"

  cover:
    hidden: true # hide everywhere but not in structured data
    hiddenInList: true # hide on list pages and home
    hiddenInSingle: true # hide on single page

  editPost:
    URL: "https://github.com/xmujin/myblog/blob/main/content"
    Text: "修改建议" # edit text
    appendFilePath: true # to append file path to Edit link

  # for search
  # https://fusejs.io/api/options.html
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10 # refer: https://www.fusejs.io/api/methods.html#search
    keys: ["title", "permalink", "summary", "content"]

# Read: https://github.com/adityatelange/hugo-PaperMod/wiki/FAQs#using-hugos-syntax-highlighter-chroma
pygmentsUseClasses: true
markup: #代码高亮配置
  highlight:
    anchorLineNos: false # 是否把每一行渲染成锚点，前提是行号有效
    codeFences: true
    guessSyntax: false
    hl_Lines: '' # 高亮特定行
    hl_inline: false # 是否允许行内高亮
    lineAnchors: ''
    lineNoStart: 1
    lineNos: true
    lineNumbersInTable: true
    noClasses: false # 不生成内联样式
    style: monokailight
    tabWidth: 4
    wrapperClass: highlight